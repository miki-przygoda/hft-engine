# stunnel configuration for the kraken-feed adapter.
#
# stunnel terminates Kraken's TLS locally so the (zero-dependency) kraken-feed
# binary can speak plaintext TCP + a hand-rolled WebSocket to it. The adapter
# never links a TLS library — see CLAUDE.md invariant #13.
#
# Install stunnel (it is an external system tool, NOT a cargo dependency):
#   macOS:        brew install stunnel
#   Debian/Ubuntu: sudo apt-get install stunnel4
#
# Run it:
#   stunnel docs/stunnel.conf
#
# Then start the engine + feed (in separate shells):
#   HFT_EXTERNAL_FEED=1 ./target/release/trading-engine
#   ./target/release/kraken-feed --live 127.0.0.1:8443 --pair XBT/USD --record recordings/live.krkr

foreground = yes
debug = 4

[kraken-ws]
client = yes
accept = 127.0.0.1:8443
connect = ws.kraken.com:443
sni = ws.kraken.com
verifyChain = yes
# On Linux, point this at your system CA bundle if verifyChain can't find it:
# CApath = /etc/ssl/certs
