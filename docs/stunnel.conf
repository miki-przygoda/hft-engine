# stunnel configuration for the kraken-feed adapter.
#
# stunnel terminates Kraken's TLS locally so the (zero-dependency) kraken-feed
# binary can speak plaintext TCP + a hand-rolled WebSocket to it. The adapter
# never links a TLS library — see CLAUDE.md invariant #13.
#
# Install stunnel (it is an external system tool, NOT a cargo dependency):
#   macOS:        brew install stunnel
#   Debian/Ubuntu: sudo apt-get install stunnel4
#
# Run it:
#   stunnel docs/stunnel.conf
#
# Then start the engine + feed (in separate shells):
#   HFT_EXTERNAL_FEED=1 ./target/release/trading-engine
#   ./target/release/kraken-feed --live 127.0.0.1:8443 --pair XBT/USD --record recordings/live.krkr

foreground = yes
debug = 4

# Live WebSocket feed (kraken-feed --live 127.0.0.1:8443).
[kraken-ws]
client = yes
accept = 127.0.0.1:8443
connect = ws.kraken.com:443
sni = ws.kraken.com
verifyChain = no

# Historical REST API (kraken-feed --history --api 127.0.0.1:8444).
[kraken-api]
client = yes
accept = 127.0.0.1:8444
connect = api.kraken.com:443
sni = api.kraken.com
verifyChain = no

# Futures public market data (kraken-feed --futures, no auth). Distinct port.
[kraken-futures]
client = yes
accept = 127.0.0.1:8445
connect = futures.kraken.com:443
sni = futures.kraken.com
verifyChain = no

# Certificate verification is OFF so this works on a fresh stunnel install (TLS
# still encrypts the link — these are public market-data taps, not authenticated
# sessions). To ENABLE chain verification, set `verifyChain = yes` per service AND
# point stunnel at a CA bundle:
#   macOS (Homebrew openssl@3): CAfile = /opt/homebrew/etc/openssl@3/cert.pem
#   macOS (system):             CAfile = /etc/ssl/cert.pem
#   Debian/Ubuntu:              CApath = /etc/ssl/certs
